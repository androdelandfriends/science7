        function changePart(id) {
            cancelActiveAnimation();
            currentPart = id;
            currentLessonIdx = 0;
            currentTabIdx = 0;
            updateUI();
        }

        function changeLesson(idx) {
            cancelActiveAnimation();
            currentLessonIdx = idx;
            currentTabIdx = 0;
            updateUI();
        }

        function changeTab(idx) {
            cancelActiveAnimation();
            currentTabIdx = idx;
            updateUI();
        }

        function updateUI() {
            // Highlighting Top Navigation buttons
            for(let i=1; i<=4; i++) {
                const btn = document.getElementById(`part-btn-${i}`);
                if (currentPart === i) btn.classList.add('active-part');
                else btn.classList.remove('active-part');
            }

            const data = appData[currentPart];
            
            // Updating Sidebar Lesson list
            const list = document.getElementById('lesson-list');
            list.innerHTML = '';
            document.getElementById('lessons-counter').innerText = `${data.lessons.length} Item(s)`;

            data.lessons.forEach((lesson, idx) => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-5 py-4 text-xs font-bold border-b border-slate-800 transition-all ${currentLessonIdx === idx ? 'active-lesson text-sky-400' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-850'}`;
                
                btn.innerHTML = `<div class="truncate">${lesson.title}</div>`;
                btn.onclick = () => changeLesson(idx);
                list.appendChild(btn);
            });

            // Updating Sub-Tabs underneath header
            const tabsContainer = document.getElementById('content-tabs-container');
            const currentLesson = data.lessons[currentLessonIdx];
            tabsContainer.innerHTML = '';
            
            if (currentLesson.tabs) {
                currentLesson.tabs.forEach((tab, idx) => {
                    const btn = document.createElement('button');
                    btn.className = `py-4 text-xs whitespace-nowrap transition-all uppercase tracking-wider font-bold px-1.5 ${currentTabIdx === idx ? 'active-content-tab' : 'text-slate-400 hover:text-slate-200'}`;
                    btn.innerText = tab.name;
                    btn.onclick = () => changeTab(idx);
                    tabsContainer.appendChild(btn);
                });
            } else {
                const label = document.createElement('span');
                label.className = "py-4 text-xs font-extrabold text-slate-400 uppercase tracking-widest";
                label.innerText = currentLesson.title;
                tabsContainer.appendChild(label);
            }

            // Populating visual Column & Textual column
            const viewer = document.getElementById('content-viewer');
            const visualPanel = document.getElementById('interactive-panel');
            
            if (currentLesson.type === 'quiz') {
                visualPanel.className = "hidden lg:hidden"; // Hide interactive column on full screen quizzes
                renderQuiz(currentLesson.key);
            } else {
                visualPanel.className = "w-full lg:w-1/2 p-6 bg-slate-900/30 flex flex-col justify-center items-center border-t lg:border-t-0 border-slate-800 overflow-y-auto";
                
                const activeTab = currentLesson.tabs[currentTabIdx];
                viewer.innerHTML = `<div class="max-w-4xl mx-auto content-fade text-slate-300 text-sm leading-relaxed">${activeTab.content}</div>`;
                
                // Loading the interactive widget associated with the current tab
                loadWidget(activeTab.widget);
            }
        }

        /* 1. Mantle Convection Fluid Simulation Code */
        function initTectonicCanvas() {
            const canvas = document.getElementById('tectonicCanvas');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            let width = canvas.width = canvas.offsetWidth;
            let height = canvas.height = canvas.offsetHeight;
            
            let speed = 2;
            const slider = document.getElementById('convectionSpeedSlider');
            if(slider) {
                slider.addEventListener('input', (e) => { speed = parseFloat(e.target.value); });
            }

            let angle = 0;
            function draw() {
                ctx.fillStyle = '#090d16';
                ctx.fillRect(0, 0, width, height);

                // Draw Earth layers
                // Rigid Lithosphere Crust (Top 40px)
                ctx.fillStyle = '#475569';
                ctx.fillRect(0, 0, width, 30);
                ctx.fillStyle = '#1e293b';
                ctx.fillRect(0, 30, width, 10);
                
                // Labels
                ctx.fillStyle = '#f8fafc';
                ctx.font = 'bold 10px Inter';
                ctx.fillText("CRUST / LITHOSPHERE (RIGID PLATES)", 20, 20);

                // Draw mantle convection fluid cells (Two circular loops)
                const cells = [
                    { cx: width * 0.3, cy: height * 0.6, r: 40, clockwise: true },
                    { cx: width * 0.7, cy: height * 0.6, r: 40, clockwise: false }
                ];

                ctx.strokeStyle = '#f97316';
                ctx.lineWidth = 2;
                cells.forEach(cell => {
                    ctx.beginPath();
                    ctx.arc(cell.cx, cell.cy, cell.r, 0, Math.PI * 2);
                    ctx.stroke();

                    // Fluid particle vector nodes moving along loop paths
                    for(let i=0; i<4; i++) {
                        let cellAngle = angle * (cell.clockwise ? 1 : -1) + (i * Math.PI / 2);
                        let ax = cell.cx + Math.cos(cellAngle) * cell.r;
                        let ay = cell.cy + Math.sin(cellAngle) * cell.r;
                        
                        ctx.fillStyle = '#ef4444';
                        ctx.beginPath();
                        ctx.arc(ax, ay, 4, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });

                ctx.fillStyle = '#f97316';
                ctx.font = 'bold 9px Inter';
                ctx.fillText("MANTLE CONVECTION FLUID DYNAMICS", width * 0.25, height - 15);

                angle += 0.01 * speed;
                currentAnimationId = requestAnimationFrame(draw);
            }
            draw();
        }

        /* 2. Interactive 3D Fault Sandbox Code */
        let faultMode = 'normal';
        let faultOffset = 0;
        let isSliding = false;
        let waves = [];

        function setFaultMode(mode) {
            faultMode = mode;
            faultOffset = 0;
            waves = [];
            document.getElementById('btn-fault-normal').className = `flex-1 py-2 text-[10px] rounded-lg font-extrabold border border-slate-700 ${mode === 'normal' ? 'bg-sky-600 text-white' : 'bg-slate-850 text-slate-400'}`;

            document.getElementById('btn-fault-strike').className = `flex-1 py-2 text-[10px] rounded-lg font-extrabold border border-slate-700 ${mode === 'strike' ? 'bg-sky-600 text-white' : 'bg-slate-850 text-slate-400'}`;
        }

        function triggerFaultSlip() {
            if (isSliding) return;
            isSliding = true;
            waves = [];
            // Generate seismic ripples at center point (hypocenter focus)
            for(let i=0; i<5; i++) {
                waves.push({ r: 0, maxR: 150 - i * 25, speed: 2 + i * 0.5 });
            }
        }

        function initFaultSimulator() {
            const canvas = document.getElementById('faultCanvas');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            let width = canvas.width = canvas.offsetWidth;
            let height = canvas.height = canvas.offsetHeight;

            setFaultMode('normal');

            function draw() {
                ctx.fillStyle = '#090d16';
                ctx.fillRect(0, 0, width, height);

                // Grid lines background
                ctx.strokeStyle = '#334155';
                ctx.lineWidth = 1;
                for(let i=0; i<width; i+=40) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, height); ctx.stroke();
                }

                // Shifting block variables
                if (isSliding) {
                    if (faultOffset < 30) {
                        faultOffset += 1.5;
                    } else {
                        isSliding = false;
                    }
                }

                const midX = width / 2;
                const splitY = height / 2;

                if (faultMode === 'normal') {
                    // Normal Fault: Hanging Wall slides DOWN (tension)
                    ctx.fillStyle = '#1e293b';
                    ctx.beginPath();
                    ctx.moveTo(30, splitY);
                    ctx.lineTo(midX, splitY);
                    ctx.lineTo(midX - 30, height - 20);
                    ctx.lineTo(30, height - 20);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = '#475569';
                    ctx.stroke();

                    ctx.fillStyle = '#334155';
                    ctx.beginPath();
                    ctx.moveTo(midX, splitY + faultOffset);
                    ctx.lineTo(width - 30, splitY + faultOffset);
                    ctx.lineTo(width - 60, height - 20 + faultOffset);
                    ctx.lineTo(midX - 30, height - 20 + faultOffset);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();

                    ctx.fillStyle = '#0ea5e9';
                    ctx.font = 'bold 10px Inter';
                    ctx.fillText("← Tension (Pulling)", 40, splitY - 15);
                    ctx.fillText("Tension (Pulling) →", midX + 30, splitY - 15);
                } 
                else if (faultMode === 'reverse') {
                    // Reverse Fault: Hanging Wall slides UP (compression)
                    ctx.fillStyle = '#1e293b';
                    ctx.beginPath();
                    ctx.moveTo(30, splitY);
                    ctx.lineTo(midX, splitY);
                    ctx.lineTo(midX - 30, height - 20);
                    ctx.lineTo(30, height - 20);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = '#475569';
                    ctx.stroke();

                    ctx.fillStyle = '#334155';
                    ctx.beginPath();
                    ctx.moveTo(midX, splitY - faultOffset);
                    ctx.lineTo(width - 30, splitY - faultOffset);
                    ctx.lineTo(width - 60, height - 20 - faultOffset);
                    ctx.lineTo(midX - 30, height - 20 - faultOffset);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();

                    ctx.fillStyle = '#ef4444';
                    ctx.font = 'bold 10px Inter';
                    ctx.fillText("→ Compression (Squeezing) ←", midX - 70, splitY - 15);
                } 
                else {
                    // Strike-Slip: Lateral sliding blocks horizontally
                    ctx.fillStyle = '#1e293b';
                    ctx.fillRect(40, 50, midX - 45 + faultOffset, height - 100);
                    ctx.fillStyle = '#334155';
                    ctx.fillRect(midX + faultOffset, 50, midX - 45, height - 100);
                    
                    ctx.strokeStyle = '#ef4444';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(midX + faultOffset, 50);
                    ctx.lineTo(midX + faultOffset, height - 50);
                    ctx.stroke();

                    ctx.fillStyle = '#e2e8f0';
                    ctx.font = 'bold 10px Inter';
                    ctx.fillText("← Left lateral shear slider →", 50, 40);
                }

                // Ripple effect if triggered
                if (waves.length > 0) {
                    ctx.strokeStyle = '#e11d48';
                    waves.forEach(w => {
                        ctx.beginPath();
                        ctx.arc(midX, splitY, w.r, 0, Math.PI * 2);
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                        w.r += w.speed;
                    });
                    waves = waves.filter(w => w.r < w.maxR);
                }

                currentAnimationId = requestAnimationFrame(draw);
            }
            draw();
        }

        /* 3. Elastic Rebound Ruler Snapping Code */
        function initReboundSimulator() {
            const canvas = document.getElementById('reboundCanvas');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            let width = canvas.width = canvas.offsetWidth;
            let height = canvas.height = canvas.offsetHeight;

            let deflection = 0;
            const slider = document.getElementById('reboundSlider');
            
            if(slider) {
                slider.addEventListener('input', (e) => {
                    const percent = parseInt(e.target.value);
                    document.getElementById('reboundStressValue').innerText = `${percent}%`;
                    deflection = percent;
                    
                    if (percent >= 98) {
                        triggerRulerSnap();
                    }
                });
            }

            let snapOffset = 0;
            let snapPhase = false;

            function triggerRulerSnap() {
                snapPhase = true;
                snapOffset = 15;
                slider.value = 0;
                deflection = 0;
                document.getElementById('reboundStressValue').innerText = `0% (RUPTURED!)`;
                
                setTimeout(() => { snapPhase = false; snapOffset = 0; }, 1000);
            }

            function draw() {
                ctx.fillStyle = '#090d16';
                ctx.fillRect(0, 0, width, height);

                ctx.fillStyle = '#b45309'; // Wood brown ruler
                ctx.strokeStyle = '#d97706';
                ctx.lineWidth = 3;

                const startX = 40;
                const startY = height / 2;
                const rulerLength = width - 80;

                ctx.beginPath();
                ctx.moveTo(startX, startY);

                if (snapPhase) {
                    // Snapped / severed ruler look
                    ctx.lineTo(startX + rulerLength / 2 - 10, startY - snapOffset);
                    ctx.moveTo(startX + rulerLength / 2 + 10, startY + snapOffset);
                    ctx.lineTo(startX + rulerLength, startY);
                    ctx.stroke();

                    ctx.fillStyle = '#f43f5e';
                    ctx.font = 'bold 12px Inter';
                    ctx.fillText("⚡ SNAP! ENERGY RELEASED", width / 2 - 80, height / 2 - 30);
                } else {
                    // Curved elastic line representing bending wood fibers
                    const ctrlX = startX + rulerLength / 2;
                    const ctrlY = startY + deflection / 1.5;
                    ctx.quadraticCurveTo(ctrlX, ctrlY, startX + rulerLength, startY);
                    ctx.stroke();

                    // Loading anchor representation applying force
                    ctx.fillStyle = '#475569';
                    ctx.beginPath();
                    ctx.arc(startX + rulerLength, startY, 10, 0, Math.PI * 2);
                    ctx.fill();
                }

                currentAnimationId = requestAnimationFrame(draw);
            }
            draw();
        }

        /* 4. Magnitude vs. Intensity Lab Code */
        function initLightbulbLab() {
            const magSlider = document.getElementById('magSlider');
            const distSlider = document.getElementById('distSlider');
            const soilSelector = document.getElementById('soilSelector');

            if (!magSlider || !distSlider || !soilSelector) return;

            function calculatePEIS() {
                const magnitude = parseInt(magSlider.value);
                const distance = parseInt(distSlider.value);
                const soil = soilSelector.value;

                document.getElementById('magSliderLabel').innerText = `Mw ${magnitude}.0`;
                document.getElementById('distSliderLabel').innerText = `${distance} km`;
                document.getElementById('bulbWattageDisplay').innerText = `Wattage (Magnitude): Mw ${magnitude}.0`;

                // Attenuation formula output
                let rawScore = (magnitude * 1.5) - (Math.log10(distance) * 2.5);
                if (soil === 'sediment') {
                    rawScore += 1.5; // Soil site amplification multiplier
                }

                const peisLevels = ["I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX", "X"];
                let levelIdx = Math.floor(rawScore);
                if (levelIdx < 0) levelIdx = 0;
                if (levelIdx >= peisLevels.length) levelIdx = peisLevels.length - 1;

                const calculated = peisLevels[levelIdx];
                const display = document.getElementById('calculatedIntensity');
                display.innerText = calculated;

                // Modulate lightbulb glow visual
                const glow = document.getElementById('lightbulbGlow');
                const scaleFactor = (magnitude / 9.0);
                glow.style.transform = `scale(${scaleFactor * 2.2})`;
                glow.style.opacity = (scaleFactor * 0.8).toString();
            }

            magSlider.addEventListener('input', calculatePEIS);
            distSlider.addEventListener('input', calculatePEIS);
            soilSelector.addEventListener('change', calculatePEIS);

            calculatePEIS();
        }

        /* 5. Undersea Tsunami Shoaling Simulation Code */
        let tWaterX = 0;
        let tsunamiProgress = 0;
        let isTsunamiActive = false;

        function triggerUnderseaQuake() {
            isTsunamiActive = true;
            tsunamiProgress = 0;
        }

        function resetTsunami() {
            isTsunamiActive = false;
            tsunamiProgress = 0;
        }

        function initTsunamiSimulator() {
            const canvas = document.getElementById('tsunamiCanvas');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            let width = canvas.width = canvas.offsetWidth;
            let height = canvas.height = canvas.offsetHeight;

            function draw() {
                ctx.fillStyle = '#090d16';
                ctx.fillRect(0, 0, width, height);

                // Shore slope profile (Deep ocean on left, shallow beach on right)
                ctx.fillStyle = '#292524';
                ctx.beginPath();
                ctx.moveTo(0, height - 30);
                ctx.lineTo(width * 0.6, height - 30);
                ctx.lineTo(width, height - 100); // Slopes upward
                ctx.lineTo(width, height);
                ctx.lineTo(0, height);
                ctx.closePath();
                ctx.fill();

                // Draw Water Layer
                ctx.fillStyle = 'rgba(14, 165, 233, 0.6)';
                
                if (isTsunamiActive) {
                    tsunamiProgress += 0.005;
                    if (tsunamiProgress > 1.0) tsunamiProgress = 0;

                    ctx.beginPath();
                    ctx.moveTo(0, height - 50);

                    for (let x = 0; x < width; x++) {
                        let y = height - 50;
                        const distToBeach = (width - x) / width;
                        
                        // Wave envelope increases closer to beach (Shoaling)
                        const shoalingMultiplier = Math.exp((1 - distToBeach) * 2.5) * 12;
                        
                        const wavePhase = (x / 30) - (tsunamiProgress * Math.PI * 4);
                        const waveH = Math.sin(wavePhase) * shoalingMultiplier;
                        
                        ctx.lineTo(x, y - waveH);
                    }
                    ctx.lineTo(width, height);
                    ctx.lineTo(0, height);
                    ctx.closePath();
                    ctx.fill();

                    ctx.fillStyle = '#f8fafc';
                    ctx.font = '9px Inter';
                    ctx.fillText("DEEP WATER: Low Amplitude", 20, 40);
                    ctx.fillText("SHALLOW COAST: Wave height spikes! (Shoaling)", width * 0.5, 40);
                } else {
                    // Calm water line representation
                    ctx.fillRect(0, height - 50, width, height);
                    ctx.fillStyle = '#38bdf8';
                    ctx.font = 'bold 9px Inter';
                    ctx.fillText("CALM WATER LEVEL", 30, height - 60);
                }

                currentAnimationId = requestAnimationFrame(draw);
            }
            draw();
        }

        /* 6. Particle Wave Grid Motion Code */
        let activeWave = 'p';
        let wavePhase = 0;

        function setWaveType(type) {
            activeWave = type;
            document.getElementById('btn-wave-p').className = `flex-1 py-2 text-[10px] rounded-lg font-extrabold border border-slate-700 ${type === 'p' ? 'bg-purple-600 text-white' : 'bg-slate-850 text-slate-400'}`;

        function initWaveSimulator() {
            const canvas = document.getElementById('waveCanvas');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            let width = canvas.width = canvas.offsetWidth;
            let height = canvas.height = canvas.offsetHeight;

            setWaveType('p');

            const cols = 22;
            const rows = 10;
            const spacingX = width / (cols + 1);
            const spacingY = height / (rows + 1);

            function draw() {
                ctx.fillStyle = '#090d16';
                ctx.fillRect(0, 0, width, height);

                ctx.fillStyle = '#c084fc';

                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        let originalX = (c + 1) * spacingX;
                        let originalY = (r + 1) * spacingY;

                        let px = originalX;
                        let py = originalY;

                        const factor = Math.sin((originalX / 40) - wavePhase);

                        if (activeWave === 'p') {
                            // Primary Wave: Longitudinal push-pull along propagation line
                            px += factor * 12;
                        } 
                        else if (activeWave === 's') {
                            // Secondary Wave: Transverse up-down displacement
                            py += factor * 14;
                        } 
                        else {
                            // Rayleigh Wave: Elliptical rolling motion diminishing with depth
                            const depthDecay = Math.exp(-r * 0.2); 
                            px += Math.cos((originalX / 40) - wavePhase) * 12 * depthDecay;
                            py += Math.sin((originalX / 40) - wavePhase) * 12 * depthDecay;
                        }

                        ctx.beginPath();
                        ctx.arc(px, py, 3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                wavePhase += 0.08;
                currentAnimationId = requestAnimationFrame(draw);
            }
            draw();
        }

        /* Assessment Handling Logic */
        function selectAnswer(quizKey, qIdx, aIdx) {
            if (quizState[quizKey].submitted) return;
            quizState[quizKey].answers[qIdx] = aIdx;
            renderQuiz(quizKey);
        }

        function submitQuiz(quizKey) {
            quizState[quizKey].submitted = true;
            renderQuiz(quizKey);
            document.getElementById('content-viewer').scrollTo({top:0, behavior:'smooth'});
        }

        function renderQuiz(key) {
            const questions = quizzes[key];
            const state = quizState[key];
            const viewer = document.getElementById('content-viewer');
            
            let score = 0;
            if (state.submitted) {
                questions.forEach((q, i) => { if(state.answers[i] === q.c) score++; });
            }

            let html = `<div class="max-w-3xl mx-auto content-fade">
                <div class="flex items-center justify-between mb-8 bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl">
                    <div>
                        <h2 class="text-lg font-black text-white uppercase tracking-tight">${key === 'general' ? 'GENERAL CURRICULUM REVIEW' : 'CHAPTER SUMMATIVE TEST'}</h2>
                        <p class="text-slate-400 text-[10px] mt-1 uppercase tracking-widest">Interactive Science 7 Assessment</p>
                    </div>
                    ${state.submitted ? `<div class="bg-orange-500 text-slate-950 px-6 py-2.5 rounded-xl font-black text-2xl shadow-lg shadow-orange-500/20">${score}/${questions.length}</div>` : ''}
                </div>`;

            questions.forEach((q, qIdx) => {
                const isCorrect = state.answers[qIdx] === q.c;
                html += `<div class="mb-6 p-6 bg-slate-900/60 rounded-2xl border ${state.submitted ? (isCorrect ? 'border-emerald-500/30 bg-emerald-950/10' : 'border-rose-500/30 bg-rose-950/10') : 'border-slate-800'}">
                    <p class="font-bold text-slate-100 mb-4 text-sm">${qIdx + 1}. ${q.q}</p>
                    <div class="grid">`;
                
                q.a.forEach((ans, aIdx) => {
                    let cls = "quiz-option ";
                    if (state.submitted) {
                        cls += "disabled ";
                        if (aIdx === q.c) cls += "quiz-correct ";
                        else if (aIdx === state.answers[qIdx]) cls += "quiz-wrong ";
                    } else if (state.answers[qIdx] === aIdx) {
                        cls += "quiz-selected ";
                    }
                    html += `<button onclick="selectAnswer('${key}', ${qIdx}, ${aIdx})" class="${cls}">${ans}</button>`;
                });

                html += `</div></div>`;
            });

            if (!state.submitted) {
                html += `<div class="flex justify-center mt-8 mb-12">
                    <button onclick="submitQuiz('${key}')" class="bg-sky-600 hover:bg-sky-500 text-white px-10 py-4 rounded-2xl font-black shadow-lg shadow-sky-600/20 uppercase tracking-widest text-xs transition-all">FINISH & COMPUTE SCORE</button>
                </div>`;
            } else {
                html += `<div class="flex justify-center mt-8 mb-12">
                    <button onclick="quizState['${key}'].submitted=false; quizState['${key}'].answers=[]; renderQuiz('${key}')" class="bg-slate-850 hover:bg-slate-800 text-slate-300 px-10 py-4 rounded-2xl font-black shadow-lg text-xs uppercase tracking-widest transition-all border border-slate-700">RETRY CHAPTER TEST</button>
                </div>`;
            }

            html += `</div>`;
            viewer.innerHTML = html;
        }

        window.onload = () => updateUI();
    </script>
</body>
</html>
